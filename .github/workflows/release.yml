name: Create Konektor Release
on:
  workflow_call:
    inputs:
      version_tag:
        description: "Enter the existing Git tag to release (e.g., v1.1.0)"
        required: true
        type: string
    secrets:
      PAT:
        description: "PAT to access ap-connector repo"
        required: true

jobs:
  build-and-release:
    # windows-2022 runner has a .net 4.7.2 already installed.
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout code from the specified tag (Public)
        uses: actions/checkout@v5
        with:
          repository: "scanye/ap-connector"
          ref: ${{ inputs.version_tag }}
          token: ${{ secrets.PAT }}
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet dependencies
        run: dotnet restore Connector.slnx

      - name: Install Wix globally (v4 — WixSharp_wix4 breaks on v7)
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add -g WixToolset.UI.wixext/4.0.5
        shell: pwsh

      - name: Set stripped version
        id: vars
        run: |
          $VERSION = "${{ inputs.version_tag }}"
          echo "VERSION=$($VERSION.Substring(1))" >> $env:GITHUB_ENV

      - name: Publish Connector.GUI and Stamp Version
        run: |
          dotnet publish src/Connector.GUI/Connector.GUI.csproj --configuration Release --self-contained true -p:PublishSingleFile=true --output ./publish-gui /p:Version=$env:VERSION /p:AssemblyVersion=$env:VERSION /p:FileVersion=$env:VERSION /p:WarningLevel=0
        shell: pwsh

      - name: Build installer builder
        run: dotnet build src/Connector.Installer/Connector.Installer.csproj -c Release

      - name: Run installer builder
        run: cd src/Connector.Installer/bin/Release/net472 && ./Connector.Installer.exe "${{ github.workspace }}/publish-gui"

      # Extract the changelog block for this version from ap-connector/changelog.txt
      # (falls back to the whole file if the version block is not found)
      - name: Create changelog
        run: |
          $version = $env:VERSION
          $releaseDir = "src/Connector.Installer/bin/Release/net472/releases"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $src = "changelog.txt"
          $out = @()
          if (Test-Path $src) {
            $capture = $false
            foreach ($line in Get-Content $src) {
              if ($line.Trim() -eq "Release v$version") { $capture = $true; $out += $line; continue }
              if ($capture -and $line -match '^\s*Release v') { break }
              if ($capture) { $out += $line }
            }
            if ($out.Count -eq 0) {
              Write-Host "No block for v$version found; using full changelog."
              $out = Get-Content $src
            }
          } else {
            Write-Host "changelog.txt not found in source checkout; writing empty changelog."
          }
          $out -join "`n" | Out-File -FilePath "$releaseDir/changelog.txt" -Encoding utf8
        shell: pwsh

      - name: Create GitHub Release and Upload Installer [Public]
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          files: |
            src/Connector.Installer/bin/Release/net472/releases/Scanye.Konektor.Installer.${{ env.VERSION }}.msi
            src/Connector.Installer/bin/Release/net472/releases/changelog.txt
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout update repository
        uses: actions/checkout@v5
        with:
          repository: 'KacperGrabowski/ap-connector-preview-channel'
          ref: main
          path: preview

      - name: Update manifest.json
        working-directory: preview
        run: |
          $version = $env:VERSION
          $tag = "${{ inputs.version_tag }}"
          $repo = "KacperGrabowski/ap-connector-preview-channel"
          $msi = "Scanye.Konektor.Installer.$version.msi"
          $json = @{
            "version" = $version
            "semver" = $version
            "url" = "https://github.com/$repo/releases/download/$tag/$msi"
            "changelog" = "https://github.com/$repo/releases/download/$tag/changelog.txt"
            "mandatory" = @{
              "value" = $false
              "minVersion" = "1.0.0"
              "mode" = "Normal"
            }
          } | ConvertTo-Json -Depth 3
          New-Item -ItemType Directory -Force -Path channels/stable | Out-Null
          Set-Content -Path channels/stable/manifest.json -Value $json
        shell: pwsh

      - name: Commit and push manifest.json
        working-directory: preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels/stable/manifest.json
          git commit -m "Update manifest.json for ${{ inputs.version_tag }}"
          git push
        shell: pwsh